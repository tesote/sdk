name: ts

on:
  push:
    branches: [main]
    tags: ['ts-v*']
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: packages/ts

jobs:
  detect:
    runs-on: blacksmith-2vcpu-ubuntu-2204
    outputs:
      should_run: ${{ steps.filter.outputs.ts }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ts:
              - 'packages/ts/**'
              - 'spec/**'

  test:
    needs: detect
    if: needs.detect.outputs.should_run == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2204
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: packages/ts/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test

  release:
    if: startsWith(github.ref, 'refs/tags/ts-v')
    runs-on: blacksmith-2vcpu-ubuntu-2204
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: packages/ts/package-lock.json
      - run: npm ci
      - name: Verify tag matches package.json version
        run: |
          tag="${GITHUB_REF#refs/tags/ts-v}"
          pkg_version="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg_version" ]; then
            echo "Tag ts-v$tag does not match package.json version $pkg_version" >&2
            exit 1
          fi
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Publish to npm (trusted publisher / OIDC)
        run: npm publish --provenance --access public
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: ${{ github.workspace }}
        run: |
          gh release create "${GITHUB_REF#refs/tags/}" \
            --title "@tesote/sdk ${GITHUB_REF#refs/tags/ts-v}" \
            --generate-notes
