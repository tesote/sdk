name: java

on:
  push:
    branches: [main]
    paths:
      - 'packages/java/**'
      - 'spec/**'
      - '.github/workflows/java.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/java/**'
      - 'spec/**'
      - '.github/workflows/java.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  test:
    runs-on: blacksmith-2vcpu-ubuntu-2204
    strategy:
      fail-fast: false
      matrix:
        java: ['17', '21']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
      - name: gradle test
        working-directory: packages/java
        run: ./gradlew test --no-daemon

  release:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: blacksmith-2vcpu-ubuntu-2204
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: gate on version
        id: gate
        working-directory: packages/java
        run: |
          set -euo pipefail
          version="$(grep -E '^version = ' build.gradle.kts | sed -E 's/.*"([^"]+)".*/\1/')"
          tag="java-v$version"
          release=true
          if git -C "$GITHUB_WORKSPACE" ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "tag $tag already exists; skipping release."
            release=false
          elif grep -qE "^## ${version} - unreleased" CHANGELOG.md; then
            echo "CHANGELOG marks ${version} as unreleased; skipping publish."
            release=false
          fi
          echo "release=$release" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - if: steps.gate.outputs.release == 'true'
        name: publish to Sonatype Central Portal
        working-directory: packages/java
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_KEY: ${{ secrets.MAVEN_GPG_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: ./gradlew publishAllPublicationsToCentralPortal --no-daemon
      - if: steps.gate.outputs.release == 'true'
        name: tag and GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.gate.outputs.tag }}"
          git tag "$tag"
          git push origin "$tag"
          gh release create "$tag" \
            --title "Java SDK ${{ steps.gate.outputs.version }}" \
            --generate-notes
