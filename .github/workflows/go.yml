name: go

# why: Go module path is `github.com/tesote/sdk/go`, so the source lives at
# `go/` at repo root (not `packages/go/`) — proxy.golang.org maps the part of
# the module path after the repo URL to the directory. Submodule semver tags
# follow `<subdir>/vX.Y.Z`, so the release tag is `go/vX.Y.Z`. Releases are
# tag-driven for the proxy — push origin <tag> and the proxy auto-discovers
# it; no publisher step.

on:
  push:
    branches: [main]
    paths:
      - 'go/**'
      - 'spec/**'
      - '.github/workflows/go.yml'
  pull_request:
    branches: [main]
    paths:
      - 'go/**'
      - 'spec/**'
      - '.github/workflows/go.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

defaults:
  run:
    working-directory: go

jobs:
  test:
    runs-on: blacksmith-2vcpu-ubuntu-2204
    strategy:
      fail-fast: false
      matrix:
        go: ['1.21', '1.24']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache-dependency-path: go/go.sum
      - name: gofmt
        run: gofmt -l . | tee /dev/stderr | (! read)
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test -race -count=1 ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: go

  release:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: blacksmith-2vcpu-ubuntu-2204
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: go/go.sum
      - name: gate on version
        id: gate
        working-directory: go
        run: |
          set -euo pipefail
          version="$(grep -oE 'Version = "[^"]+"' version.go | head -1 | sed -E 's/.*"([^"]+)".*/\1/')"
          tag="go/v$version"
          release=true
          if git -C "$GITHUB_WORKSPACE" ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "tag $tag already exists; skipping release."
            release=false
          elif grep -qE "^## ${version} - unreleased" CHANGELOG.md; then
            echo "CHANGELOG marks ${version} as unreleased; skipping publish."
            release=false
          fi
          echo "release=$release" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - if: steps.gate.outputs.release == 'true'
        name: verify CHANGELOG entry
        working-directory: go
        run: |
          version="${{ steps.gate.outputs.version }}"
          if ! grep -qE "^## ${version}( |$)" CHANGELOG.md; then
            echo "::error::CHANGELOG.md missing '## ${version}' section" >&2
            exit 1
          fi
      - if: steps.gate.outputs.release == 'true'
        name: tag and GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: ${{ github.workspace }}
        run: |
          # why: proxy.golang.org auto-discovers via the new tag — no publish step.
          # Submodule tag format `go/vX.Y.Z` is required because the module
          # lives in a repo subdirectory.
          tag="${{ steps.gate.outputs.tag }}"
          git tag "$tag"
          git push origin "$tag"
          gh release create "$tag" --title "$tag" --generate-notes
