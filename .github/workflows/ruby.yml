name: ruby

on:
  push:
    branches: [main]
    paths:
      - 'packages/ruby/**'
      - 'spec/**'
      - '.github/workflows/ruby.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/ruby/**'
      - 'spec/**'
      - '.github/workflows/ruby.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

defaults:
  run:
    working-directory: packages/ruby

jobs:
  test:
    runs-on: blacksmith-2vcpu-ubuntu-2204
    strategy:
      fail-fast: false
      matrix:
        ruby: ['3.0', '3.4', '4.0.3']
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
          working-directory: packages/ruby
      - name: rubocop
        run: bundle exec rubocop
      - name: rspec
        run: bundle exec rspec

  release:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: blacksmith-2vcpu-ubuntu-2204
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
          working-directory: packages/ruby
      - name: gate on version
        id: gate
        run: |
          set -euo pipefail
          version="$(ruby -r ./lib/tesote_sdk/version.rb -e 'print TesoteSdk::VERSION')"
          tag="ruby-v$version"
          release=true
          if git -C "$GITHUB_WORKSPACE" ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "tag $tag already exists; skipping release."
            release=false
          elif grep -qE "^## ${version} - unreleased" CHANGELOG.md; then
            echo "CHANGELOG marks ${version} as unreleased; skipping publish."
            release=false
          fi
          echo "release=$release" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - if: steps.gate.outputs.release == 'true'
        name: build gem
        run: gem build tesote-sdk.gemspec
      - if: steps.gate.outputs.release == 'true'
        name: configure RubyGems OIDC credentials
        uses: rubygems/configure-rubygems-credentials@v1.0.0
      - if: steps.gate.outputs.release == 'true'
        name: publish gem
        run: gem push "tesote-sdk-${{ steps.gate.outputs.version }}.gem"
      - if: steps.gate.outputs.release == 'true'
        name: tag and GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: ${{ github.workspace }}
        run: |
          tag="${{ steps.gate.outputs.tag }}"
          git tag "$tag"
          git push origin "$tag"
          gh release create "$tag" \
            --title "$tag" \
            --generate-notes \
            packages/ruby/tesote-sdk-*.gem
