name: php

# why: PHP version source is packages/php/VERSION (single line). Packagist
# pulls from git tags via webhook — the release job creates the tag, and
# Packagist indexes it.

on:
  push:
    branches: [main]
    paths:
      - 'packages/php/**'
      - 'spec/**'
      - '.github/workflows/php.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/php/**'
      - 'spec/**'
      - '.github/workflows/php.yml'

permissions:
  contents: read

jobs:
  test:
    runs-on: blacksmith-2vcpu-ubuntu-2204
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.4']
    steps:
      - uses: actions/checkout@v4
      - name: setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: curl, json
          coverage: none
          tools: composer:v2
      - name: composer install
        working-directory: packages/php
        run: composer install --no-interaction --no-progress --prefer-dist
      - name: php-cs-fixer (dry-run)
        working-directory: packages/php
        run: vendor/bin/php-cs-fixer fix --dry-run --diff
      - name: phpstan
        working-directory: packages/php
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=512M
      - name: phpunit
        working-directory: packages/php
        run: vendor/bin/phpunit --colors=never

  release:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: blacksmith-2vcpu-ubuntu-2204
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: gate on version
        id: gate
        working-directory: packages/php
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < VERSION)"
          tag="php-v$version"
          if git -C "$GITHUB_WORKSPACE" ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "tag $tag already exists; skipping release."
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - if: steps.gate.outputs.release == 'true'
        name: tag and GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # why: Packagist publishes via the GitHub webhook on tag push — no
          # token in this workflow. One-time setup: register the package at
          # packagist.org and add the GitHub webhook.
          tag="${{ steps.gate.outputs.tag }}"
          git tag "$tag"
          git push origin "$tag"
          gh release create "$tag" \
            --title "$tag" \
            --generate-notes
