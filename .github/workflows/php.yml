name: php

on:
  push:
    branches: [main]
    tags: ['php-v*']
  pull_request:

jobs:
  detect:
    runs-on: blacksmith-2vcpu-ubuntu-2204
    outputs:
      should_run: ${{ steps.filter.outputs.php }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            php:
              - 'packages/php/**'
              - 'spec/**'

  test:
    needs: detect
    if: needs.detect.outputs.should_run == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2204
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: curl, json
          coverage: none
          tools: composer:v2
      - name: Install dependencies
        working-directory: packages/php
        run: composer install --no-interaction --no-progress --prefer-dist
      - name: php-cs-fixer (dry-run)
        working-directory: packages/php
        run: vendor/bin/php-cs-fixer fix --dry-run --diff
      - name: phpstan
        working-directory: packages/php
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=512M
      - name: phpunit
        working-directory: packages/php
        run: vendor/bin/phpunit --colors=never

  release:
    if: startsWith(github.ref, 'refs/tags/php-v')
    runs-on: blacksmith-2vcpu-ubuntu-2204
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: curl, json
          coverage: none
          tools: composer:v2
      - name: Install dependencies
        working-directory: packages/php
        run: composer install --no-interaction --no-progress --prefer-dist
      - name: Verify tag matches composer.json version
        working-directory: packages/php
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#php-v}"
          # composer.json may omit the version field — Packagist takes it from the tag.
          # If present, it must agree with the tag.
          if grep -q '"version"' composer.json; then
            manifest_version=$(php -r '$j=json_decode(file_get_contents("composer.json"), true); echo $j["version"] ?? "";')
            if [ "$manifest_version" != "$tag_version" ]; then
              echo "tag $tag_version does not match composer.json version $manifest_version" >&2
              exit 1
            fi
          fi
          echo "release version: $tag_version"
      - name: phpunit
        working-directory: packages/php
        run: vendor/bin/phpunit --colors=never
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
      # why: Packagist publishes via the GitHub webhook on tag push — no token in this workflow.
      # One-time setup: register the package at packagist.org/packages/submit and add the GitHub webhook.
