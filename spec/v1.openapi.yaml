          -H 'Authorization: Bearer YOUR_API_KEY'
        ```
      parameters:
        - name: paymentMethodId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The unique identifier of the payment method
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Payment method deleted successfully
        '404':
          description: Payment method not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT Authorization header using the Bearer scheme.
        Example: "Bearer {token}"

  schemas:
    Account:
      type: object
      required:
        - id
        - name
        - data
        - bank
        - legal_entity
        - tesote_created_at
        - tesote_updated_at
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        data:
          type: object
          required:
            - masked_account_number
            - currency
            - transactions_data_current_as_of
            - balance_data_current_as_of
          properties:
            masked_account_number:
              type: string
            currency:
              type: string
              example: USD
            transactions_data_current_as_of:
              type: string
              format: date-time
              nullable: true
            balance_data_current_as_of:
              type: string
              format: date-time
              nullable: true
            custom_user_provided_identifier:
              type: string
              nullable: true
            balance_cents:
              type: string
              description: Present only when workspace has "Display Balances in API" enabled in Workspace Settings
              example: "10000"
            available_balance_cents:
              type: string
              description: Present only when workspace has "Display Balances in API" enabled in Workspace Settings
              example: "5000"
        bank:
          type: object
          properties:
            name:
              type: string
              nullable: true
        legal_entity:
          type: object
          properties:
            id:
              type: string
              format: uuid
              nullable: true
            legal_name:
              type: string
              nullable: true
        tesote_created_at:
          type: string
          format: date-time
        tesote_updated_at:
          type: string
          format: date-time

    Transaction:
      type: object
      required:
        - id
        - status
        - data
        - tesote_imported_at
        - tesote_updated_at
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          example: draft
        data:
          type: object
          required:
            - amount_cents
            - currency
          properties:
            amount_cents:
              type: integer
              format: int64
            currency:
              type: string
              example: USD
            description:
              type: string
              nullable: true
            transaction_date:
              type: string
              format: date
              nullable: true
            created_at:
              type: string
              format: date-time
              nullable: true
              description: Deprecated – will change to created_at in v2
            created_at_date:
              type: string
              format: date
              nullable: true
            note:
              type: string
              nullable: true
            external_service_id:
              type: string
              nullable: true
        tesote_imported_at:
          type: string
          format: date-time
        tesote_updated_at:
          type: string
          format: date-time
        transaction_categories:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              external_category_code:
                type: string
                nullable: true
                description: Custom code for external system integration
              created_at:
                type: string
                format: date-time
              updated_at:
                type: string
                format: date-time
        counterparty:
          type: object
          nullable: true
          properties:
            name:
              type: string

    TransactionList:
      type: object
      properties:
        id:
          type: string
          example: 42d51cc6-78cd-4e69-9fea-c20e42f590e7
        status:
          type: string
          example: completed
        data:
          type: object
          properties:
            amount_cents:
              type: integer
              example: -75500000
            external_service_id:
              type: string
              nullable: true
              example: "SPEI-202412140001"
            currency:
              type: string
              example: USD
            description:
              type: string
              nullable: true
              example: SPEI - Pago nómina empleados diciembre 2024
            transaction_date:
              type: string
              nullable: true
              example: "2024-12-14"
            created_at:
              type: string
              nullable: true
              example: "2024-12-14T10:30:00-05:00"
            created_at_date:
              type: string
              nullable: true
              example: "2024-12-14"
            note:
              type: string
              nullable: true
              example: Pago quincenal - Nómina corporativa diciembre
              description: User-provided note associated with this transaction
        tesote_imported_at:
          type: string
          format: date-time
          example: "2024-12-14T10:35:22-05:00"
        tesote_updated_at:
          type: string
          format: date-time
          example: "2024-12-14T10:35:22-05:00"

    StatusResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        authenticated:
          type: boolean
          example: true

    ClientInfo:
      type: object
      properties:
        client:
          type: object
          properties:
            id:
              type: string
              example: 12650aab-18fb-4bc3-b1d4-6264fcbcb755
            name:
              type: string
              example: Corporativo Financiero LATAM S.A. de C.V.
            type:
              type: string
              example: workspace

    TransactionOrder:
      type: object
      required:
        - id
        - status
        - amount
        - currency
        - source_account
        - destination
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the transaction order
        status:
          type: string
          enum:
            - draft
            - pending_approval
            - approved
            - processing
            - completed
            - partially_completed
            - failed
            - cancelled
          description: Current status of the transaction order
        amount:
          type: number
          format: double
          description: Payment amount as decimal
          example: 1000.00
        currency:
          type: string
          description: Currency code
          example: VES
        description:
          type: string
          nullable: true
          description: Payment description
        reference:
          type: string
          nullable: true
          description: Internal reference number
        external_reference:
          type: string
          nullable: true
          description: Bank-provided reference number
        idempotency_key:
          type: string
          nullable: true
          description: Client-provided idempotency key
        scheduled_for:
          type: string
          format: date-time
          nullable: true
          description: Scheduled execution time
        approved_at:
          type: string
          format: date-time
          nullable: true
          description: When the order was approved
        submitted_at:
          type: string
          format: date-time
          nullable: true
          description: When the order was submitted to the bank
        completed_at:
          type: string
          format: date-time
          nullable: true
          description: When the order was completed
        failed_at:
          type: string
          format: date-time
          nullable: true
          description: When the order failed
        cancelled_at:
          type: string
          format: date-time
          nullable: true
          description: When the order was cancelled
        source_account:
          type: object
          description: Source account information
          properties:
            id:
              type: string
              format: uuid
              description: Account ID
            name:
              type: string
              description: Account name
            payment_method_id:
              type: string
              format: uuid
              description: Source payment method ID
        destination:
          type: object
          description: Destination payment information
          properties:
            payment_method_id:
              type: string
              format: uuid
              description: Destination payment method ID
            counterparty_id:
              type: string
              format: uuid
              nullable: true
              description: Counterparty ID
            counterparty_name:
              type: string
              nullable: true
              description: Counterparty name
        fee:
          type: object
          nullable: true
          description: Transaction fee (if applicable)
          properties:
            amount:
              type: number
              format: double
              description: Fee amount
            currency:
              type: string
              description: Fee currency
        execution_strategy:
          type: string
          nullable: true
          description: Execution strategy from configuration
        tesote_transaction:
          type: object
          nullable: true
          description: Associated TesoteTransaction (created when submitted)
          properties:
            id:
              type: string
              format: uuid
              description: Transaction ID
            status:
              type: string
              description: Transaction status
              example: pending_confirmation
        latest_attempt:
          type: object
          nullable: true
          description: Latest submission attempt
          properties:
            id:
              type: string
              format: uuid
            status:
              type: string
              enum:
                - pending
                - submitted
                - failed
                - succeeded
            attempt_number:
              type: integer
              description: Attempt sequence number
            external_reference:
              type: string
              nullable: true
              description: Bank reference for this attempt
            submitted_at:
              type: string
              format: date-time
              nullable: true
            completed_at:
              type: string
              format: date-time
              nullable: true
            error_code:
              type: string
              nullable: true
              description: Error code if attempt failed
            error_message:
              type: string
              nullable: true
              description: Error message if attempt failed
        created_at:
          type: string
          format: date-time
          description: When the order was created
        updated_at:
          type: string
          format: date-time
          description: When the order was last updated

    PaymentMethod:
      type: object
      required:
        - id
        - method_type
        - currency
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the payment method
        method_type:
          type: string
          enum:
            - bank_account
            - pago_movil
            - wire
            - crypto_wallet
            - fx_rail
            - ach
          description: Type of payment method
        currency:
          type: string
          description: Currency code
          example: VES
        label:
          type: string
          nullable: true
          description: Human-readable label for this payment method
        details:
          type: object
          description: Method-specific details (bank_code, account_number, etc.)
          additionalProperties: true
          example:
            bank_code: "0102"
            account_number: "01020123456789"
            account_type: "corriente"
        verified:
          type: boolean
          description: Whether this payment method has been verified
        verified_at:
          type: string
          format: date-time
          nullable: true
          description: When the payment method was verified
        last_used_at:
          type: string
          format: date-time
          nullable: true
          description: When this payment method was last used
        counterparty:
          type: object
          nullable: true
          description: Associated counterparty (for external payment methods)
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
        tesote_account:
          type: object
          nullable: true
          description: Associated Tesote account (for source payment methods)
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
        created_at:
          type: string
          format: date-time
          description: When the payment method was created
        updated_at:
          type: string
          format: date-time
          description: When the payment method was last updated

    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Error type or message
          example: validation_error
        message:
          type: string
          description: Human-readable error message
          example: Amount must be greater than 0
        details:
          type: object
          description: Additional error details
          additionalProperties: true
          example:
            field: amount
            code: invalid
