paths:
  /accounts:
    get:
      summary: Fetch Accounts
      description: |
        Retrieves a list of accounts using traditional page-based pagination. The response includes total count and account details.

        ## Page-Based Pagination

        This endpoint uses traditional page-based pagination with page numbers:

        - Use `page` parameter to specify which page to retrieve (starting from 1)
        - Use `per_page` parameter to control how many accounts per page (max 100, default 50)
        - Response includes pagination metadata with current page, total pages, and total count

        cURL example:
        ```
        curl -X GET 'https://staging.tesote.com/api/v1/accounts?page=1&per_page=50' \
          -H 'Content-Type: application/json' \
          -H 'Authorization: Bearer YOUR_TOKEN_HERE'
        ```
      parameters:
        - name: per_page
          in: query
          description: Number of accounts to return per page. Maximum is 100 (default is 50).
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: page
          in: query
          description: Page number to retrieve (starting from 1).
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
      security:
        - bearerAuth: []
      responses:
        '200':
          description: A successful response returning a list of accounts.
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                    description: Total number of accounts available
                    example: 10
                  accounts:
                    type: array
                    items:
                      $ref: '#/components/schemas/Account'
                  pagination:
                    type: object
                    description: Page-based pagination information
                    properties:
                      current_page:
                        type: integer
                        description: Current page number
                        example: 1
                      per_page:
                        type: integer
                        description: Number of accounts per page
                        example: 50
                      total_pages:
                        type: integer
                        description: Total number of pages available
                        example: 1
                      total_count:
                        type: integer
                        description: Total number of accounts
                        example: 10
        '400':
          description: Bad Request - Invalid pagination parameters provided.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Pagination size must be between 1 and 100
        '401':
          description: Unauthorized - Invalid or missing bearer token.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Unauthorized
        '404':
          description: Not Found - The requested resource is not available.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Resource not found

