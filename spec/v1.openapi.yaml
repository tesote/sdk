  /v2/accounts/{accountId}/transaction_orders:
    get:
      summary: List transaction orders for an account
      description: |
        Retrieves a list of transaction orders (payment orders) for a specified account ID.

        Transaction orders represent payment instructions that can be created, approved, and submitted to banks.

        cURL example:
        ```bash
        curl -X GET 'https://staging.tesote.com/api/v2/accounts/ACCOUNT_ID/transaction_orders?status=submitted&per_page=50' \
          -H 'Authorization: Bearer YOUR_API_KEY'
        ```
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The unique identifier of the account
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - draft
              - pending_approval
              - approved
              - processing
              - completed
              - partially_completed
              - failed
              - cancelled
          description: Filter orders by status
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          description: Number of orders to return per page
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Cursor for pagination (returned in meta.next_cursor)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successful response with transaction orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  transaction_orders:
                    type: array
                    items:
                      $ref: '#/components/schemas/TransactionOrder'
                  meta:
                    type: object
                    properties:
                      next_cursor:
                        type: string
                        nullable: true
                        description: Cursor for next page of results
                      has_more:
                        type: boolean
                        description: Whether more results are available
        '400':
          description: Bad Request - Invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - Invalid or missing bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Account not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      summary: Create a transaction order
      description: |
        Creates a new transaction order (payment instruction) for the specified account.

        The order starts in 'draft' status and must be submitted before being sent to the bank.

        cURL example:
        ```bash
        curl -X POST 'https://staging.tesote.com/api/v2/accounts/ACCOUNT_ID/transaction_orders' \
          -H 'Authorization: Bearer YOUR_API_KEY' \
          -H 'Content-Type: application/json' \
          -d '{
            "transaction_order": {
              "destination_payment_method_id": "uuid",
              "amount": "1000.00",
              "currency": "VES",
              "description": "Payment for services",
              "idempotency_key": "unique-key-123"
            }
          }'
        ```
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The unique identifier of the account
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - transaction_order
              properties:
                transaction_order:
                  type: object
                  required:
                    - destination_payment_method_id
                    - amount
                    - currency
                  properties:
                    destination_payment_method_id:
                      type: string
                      format: uuid
                      description: ID of the destination payment method (beneficiary)
                    amount:
                      type: string
                      description: Payment amount (decimal string)
                      example: "1000.00"
                    currency:
                      type: string
                      description: Currency code
                      example: "VES"
                    description:
                      type: string
                      description: Payment description
                    scheduled_for:
                      type: string
                      format: date-time
                      description: Optional scheduled execution time
                    idempotency_key:
                      type: string
                      description: Optional idempotency key to prevent duplicate orders
      responses:
        '201':
          description: Transaction order created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  transaction_order:
                    $ref: '#/components/schemas/TransactionOrder'
        '400':
          description: Bad Request - Invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Unprocessable Entity - Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v2/accounts/{accountId}/transaction_orders/{orderId}:
    get:
      summary: Get a transaction order
      description: |
        Retrieves details of a specific transaction order, including execution status and attempts.

        cURL example:
        ```bash
        curl -X GET 'https://staging.tesote.com/api/v2/accounts/ACCOUNT_ID/transaction_orders/ORDER_ID' \
          -H 'Authorization: Bearer YOUR_API_KEY'
        ```
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The unique identifier of the account
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The unique identifier of the transaction order
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Transaction order found
          content:
            application/json:
              schema:
                type: object
                properties:
                  transaction_order:
                    $ref: '#/components/schemas/TransactionOrder'
        '404':
          description: Transaction order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v2/accounts/{accountId}/transaction_orders/{orderId}/submit:
    post:
      summary: Submit a transaction order to the bank
      description: |
        Submits an approved transaction order to the bank for processing.

        This creates a TesoteTransaction immediately with 'pending_confirmation' status and begins bank submission.

        cURL example:
        ```bash
        curl -X POST 'https://staging.tesote.com/api/v2/accounts/ACCOUNT_ID/transaction_orders/ORDER_ID/submit' \
          -H 'Authorization: Bearer YOUR_API_KEY'
        ```
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The unique identifier of the account
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The unique identifier of the transaction order
      security:
        - bearerAuth: []
      responses:
        '202':
          description: Order submitted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  transaction_order:
                    $ref: '#/components/schemas/TransactionOrder'
        '409':
          description: Conflict - Order cannot be submitted (invalid status)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Unprocessable Entity - Bank submission failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v2/accounts/{accountId}/transaction_orders/{orderId}/cancel:
    post:
      summary: Cancel a transaction order
      description: |
        Cancels a transaction order that has not yet been submitted to the bank.

        Only orders in 'draft', 'pending_approval', or 'approved' status can be cancelled.

        cURL example:
        ```bash
        curl -X POST 'https://staging.tesote.com/api/v2/accounts/ACCOUNT_ID/transaction_orders/ORDER_ID/cancel' \
          -H 'Authorization: Bearer YOUR_API_KEY'
        ```
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The unique identifier of the account
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The unique identifier of the transaction order
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Order cancelled successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  transaction_order:
                    $ref: '#/components/schemas/TransactionOrder'
        '409':
          description: Conflict - Order cannot be cancelled (already submitted)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v2/payment_methods:
    get:
      summary: List payment methods
      description: |
        Retrieves a list of payment methods (bank accounts, counterparty payment details) for the workspace.

        Payment methods define where money can be sent to or received from.

        cURL example:
        ```bash
        curl -X GET 'https://staging.tesote.com/api/v2/payment_methods?method_type=bank_account&per_page=50' \
          -H 'Authorization: Bearer YOUR_API_KEY'
        ```
      parameters:
        - name: method_type
          in: query
          required: false
          schema:
            type: string
            enum:
              - bank_account
              - pago_movil
              - wire
              - crypto_wallet
              - fx_rail
              - ach
          description: Filter by payment method type
        - name: currency
          in: query
          required: false
          schema:
            type: string
          description: Filter by currency (e.g., VES, USD)
        - name: counterparty_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Filter by counterparty ID
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          description: Number of payment methods to return per page
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Cursor for pagination
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successful response with payment methods
          content:
            application/json:
              schema:
                type: object
                properties:
                  payment_methods:
                    type: array
                    items:
                      $ref: '#/components/schemas/PaymentMethod'
                  meta:
                    type: object
                    properties:
                      next_cursor:
                        type: string
                        nullable: true
                      has_more:
                        type: boolean
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      summary: Create a payment method
      description: |
        Creates a new payment method for a counterparty or account.

        cURL example:
        ```bash
        curl -X POST 'https://staging.tesote.com/api/v2/payment_methods' \
          -H 'Authorization: Bearer YOUR_API_KEY' \
          -H 'Content-Type: application/json' \
          -d '{
            "payment_method": {
              "counterparty_id": "uuid",
              "method_type": "bank_account",
              "currency": "VES",
              "label": "Main operating account",
              "details": {
                "bank_code": "0102",
                "account_number": "01020123456789",
                "account_type": "corriente"
              }
            }
          }'
        ```
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - payment_method
              properties:
                payment_method:
                  type: object
                  required:
                    - method_type
                    - currency
                  properties:
                    counterparty_id:
                      type: string
                      format: uuid
                      description: ID of the counterparty (required for external payment methods)
                    tesote_account_id:
                      type: string
                      format: uuid
                      description: ID of the Tesote account (for source payment methods)
                    method_type:
                      type: string
                      enum:
                        - bank_account
                        - pago_movil
                        - wire
                        - crypto_wallet
                        - fx_rail
                        - ach
                      description: Type of payment method
                    currency:
                      type: string
                      description: Currency code
                    label:
                      type: string
                      description: Human-readable label
                    details:
                      type: object
                      description: Method-specific details (bank_code, account_number, etc.)
      responses:
        '201':
          description: Payment method created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  payment_method:
                    $ref: '#/components/schemas/PaymentMethod'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Unprocessable Entity - Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v2/payment_methods/{paymentMethodId}:
    get:
      summary: Get a payment method
      description: |
        Retrieves details of a specific payment method.

        cURL example:
        ```bash
        curl -X GET 'https://staging.tesote.com/api/v2/payment_methods/PAYMENT_METHOD_ID' \
          -H 'Authorization: Bearer YOUR_API_KEY'
