  /status:
    get:
      summary: Check Authentication Status
      description: |
        This endpoint returns the current authentication status of the user.

        cURL example:
        ```
        curl -X GET 'https://staging.tesote.com/api/status' \
          -H 'Content-Type: application/json' \
          -H 'Authorization: Bearer YOUR_TOKEN_HERE'
        ```
      responses:
