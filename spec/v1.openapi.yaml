                payment_method:
                  type: object
                  properties:
                    label:
                      type: string
                    details:
                      type: object
                      description: Method-specific details to update
      responses:
        '200':
          description: Payment method updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
