info:
  title: Tesote API
  description: |
    # Welcome to the Tesote API

    The Tesote API provides secure, reliable access to financial account data and transaction information. Built for developers who need robust financial data integration with enterprise-grade security and compliance.

    ## Key Features
    - **Secure Authentication**: Bearer token-based authentication with JWT
    - **Real-time Data**: Access to up-to-date account balances and transaction history
    - **Comprehensive Coverage**: Support for multiple financial institutions and account types
    - **Developer-Friendly**: RESTful design with comprehensive documentation and examples
    - **Enterprise Ready**: Built for scale with rate limiting and monitoring
    ## Rate Limiting
    The Tesote API implements rate limiting to ensure fair usage and system stability:
    - **Limit**: 200 requests per minute per IP address
    - **Window**: 60-second rolling window
    - **Response**: When the limit is exceeded, the API returns a `429 Too Many Requests` status code
    - **Retry-After**: The response includes a `Retry-After` header indicating when to retry (in seconds)
    Rate limit headers are included in API responses to help you track your usage.
    ## Coming Soon
    **Webhooks**: We're developing webhook functionality to improve real-time data synchronization. This will allow your application to receive instant notifications when account balances change or new transactions are processed, eliminating the need for frequent polling.
    ## Getting Started
    1. **Contact your Tesote Account Executive** to request API credentials
    2. Receive your bearer token and account configuration
    3. Test connectivity using the `/status` endpoint
    4. Start making API calls to access your financial data
    5. Monitor rate limits to ensure optimal performance

    **Note**: API access is provided as part of our enterprise offering. Contact your account executive for credentials and technical onboarding support.

    ## How Data Flows in V1 API

    Understanding the data flow in Tesote API V1 helps you build robust integrations that maintain data consistency and handle transaction changes properly.

    ### 🔄 Simple Data Flow

    V1 API uses a **polling-based architecture** where your application regularly checks for updates:

    ```
    Step 1: 🏦 Bank → Transaction occurs (new/updated data)
            ↓
    Step 2: 👤 User initiates Tesote-to-Bank Sync in Tesote platform
            ↓
    Step 3: 🔄 Tesote fetches & processes bank data
            ↓
    Step 4: ⏰ Your scheduled polling job triggers
            ↓
    Step 5: 💻 Your app polls transactions endpoint
            ↓
    Step 6: 🔄 Tesote returns transaction data
            ↓
    Step 7: 💻 Your system stores/updates data
    ```

    ### 🎯 Two-Stage Process Summary

    ```
    STAGE 1: Tesote-to-Bank Sync (User-Initiated)
    ┌─────────────────────────────────────────────┐
    │ 🏦 Bank Data → 🔄 Tesote Platform           │
    │ • User initiates sync in Tesote UI         │
    │ • Tesote fetches data from bank             │
    │ • Can be manual or scheduled                │
    └─────────────────────────────────────────────┘
                            ↓
    STAGE 2: Your Polling Process (Your Code)
    ┌─────────────────────────────────────────────┐
    │ ⏰ Schedule → 💻 Your System → 🔄 Tesote    │
    │ • You implement scheduled polling           │
    │ • You call transactions API with date range │
    │ • You poll scope=deleted for changes        │
    │ • You store data & track last sync time     │
    └─────────────────────────────────────────────┘
    ```

    ### ⏱️ Timing & Responsibilities

    | Step | Actor | Action | Timing | Your Control |
    |------|-------|--------|--------|--------------|
    | ① | Bank | Transaction occurs | Variable | ❌ None |
    | ② | User | Initiate **Tesote-to-Bank Sync** | User-initiated | ✅ **You control timing** |
    | ③ | Tesote | Process & store data | < 1 min | ❌ Automatic after step ② |
    | ④ | You | Scheduled polling job triggers | Your schedule | ✅ **You control frequency** |
    | ⑤ | You | Poll transactions endpoint | Based on schedule | ✅ **You implement** |
    | ⑥ | Tesote | Return transaction data | < 5 sec | ❌ Automatic |
    | ⑦ | You | Store data & track sync time | Variable | ✅ **You implement** |

    ### 🎯 Key Success Factors
    - **Regular Polling**: Poll transactions daily (or more frequently for active accounts)
    - **Poll Deleted Scope**: Query `scope=deleted` to detect removed transactions
    - **Date Range Tracking**: Track last sync date to minimize API calls
    - **Idempotency**: Use transaction IDs to avoid duplicate storage
    - **Rate Limiting**: Respect API rate limits (200 requests/minute)

    ### 📊 Polling Patterns Comparison

    | Scenario | Polling Endpoint | Query Parameters | Expected Result |
    |----------|-----------------|------------------|-----------------|
    | **New Transactions** | `/accounts/{id}/transactions` | `start_date`, `end_date` | New transactions returned |
    | **Deleted Transactions** | `/accounts/{id}/transactions` | `scope=deleted`, `start_date`, `end_date` | Deleted transaction IDs returned |
    | **Full Sync** | `/accounts/{id}/transactions` | `start_date`, `end_date`, pagination | All transactions in range |
    | **Recent Changes** | `/accounts/{id}/transactions` | `start_date=yesterday` + `scope=deleted` | Recent adds + deletes |

    ### 💡 Quick Reference Card

    ```
    ╔══════════════════════════════════════════════════════════════════╗
    ║                        🚀 IMPLEMENTATION CHECKLIST               ║
    ╠══════════════════════════════════════════════════════════════════╣
    ║ ✅ POLLING SCHEDULE: Set up daily (or more frequent) polling     ║
    ║ ✅ TRANSACTIONS ENDPOINT: Call with date range filters           ║
    ║ ✅ DELETED SCOPE: Poll scope=deleted to detect removals          ║
    ║ ✅ DATE TRACKING: Store last sync time for incremental polling   ║
    ║ ✅ IDEMPOTENCY: Use transaction IDs to avoid duplicates         ║
    ║ ✅ ERROR HANDLING: Retry failed requests with exponential backoff║
    ║                                                                  ║
    ║ 🔴 NEVER: Poll more than 200 requests/minute (rate limit)       ║
    ║ 🔴 NEVER: Ignore deleted scope - you'll miss removals           ║
    ║ 🔴 NEVER: Poll without date filters - inefficient & slow        ║
    ╚══════════════════════════════════════════════════════════════════╝
    ```

    ### Polling Implementation Example

    #### **Scheduled Polling Job:**
    ```python
    def poll_tesote_transactions():
        # 1. Get last sync timestamp
        last_sync = get_last_sync_timestamp() or "30_days_ago"
        today = date.today().isoformat()

        for account in get_active_accounts():
            # 2. Poll for new/updated transactions
            response = tesote_api.get(
                f'/api/v1/accounts/{account.id}/transactions',
                params={
                    'start_date': last_sync,
                    'end_date': today,
                    'per_page': 100
                }
            )

            # 3. Process new/updated transactions
            for transaction in response['transactions']:
                upsert_transaction(transaction)

            # 4. Poll for deleted transactions
            deleted_response = tesote_api.get(
                f'/api/v1/accounts/{account.id}/transactions',
                params={
                    'scope': 'deleted',
                    'start_date': last_sync,
                    'end_date': today,
                    'per_page': 100
                }
            )

            # 5. Remove deleted transactions
            for deleted_tx in deleted_response['transactions']:
                delete_transaction(deleted_tx['id'])

        # 6. Update last sync timestamp
        store_last_sync_timestamp(today)
    ```

    ### Polling Frequency Recommendations

    | Account Activity | Recommended Polling Frequency | Rationale |
    |------------------|------------------------------|-----------|
    | **Very High Volume** (>1,000 transactions/day) | **Every 1-2 hours** | Enterprise accounts need frequent updates for real-time operations |
    | **High Volume** (100-1,000 transactions/day) | **Every 4-6 hours** | Catch changes quickly while respecting rate limits |
    | **Medium Volume** (10-100 transactions/day) | **Daily** | Balance freshness with API efficiency |
    | **Low Volume** (<10 transactions/day) | **Daily** | Maintain consistency without excess API calls |
    | **Inactive** (no recent activity) | **Weekly** | Reduce unnecessary API calls |

    ### Transaction Mutability & Changes

    #### Transactions Can Change After Creation
    Even after transactions appear in the API, they can still change:
    - **Status Changes**: `pending` → `completed` based on Tesote's aging logic (36 business hours)
    - **Amount Adjustments**: Banks may correct amounts after settlement
    - **Deletions**: Failed transactions, cancellations, or bank corrections appear in `scope=deleted`
    - **Category Updates**: User-assigned categories and counterparties can change

    #### Polling for Changes
    Your polling strategy should handle all change types:
    ```python
    # Poll for new/updated transactions (upsert operation)
    GET /api/v1/accounts/{id}/transactions?start_date={last_sync}&end_date={today}

    # Poll for deleted transactions (delete operation)
    GET /api/v1/accounts/{id}/transactions?scope=deleted&start_date={last_sync}&end_date={today}
    ```

    ### Best Practices for Implementation

    1. **Incremental Polling**: Always use `start_date` based on your last successful sync
    2. **Handle Deleted Scope**: Poll `scope=deleted` in addition to regular transactions
    3. **Upsert Logic**: Use transaction IDs to update existing records or create new ones
    4. **Error Recovery**: Store sync checkpoint before processing to enable retry
    5. **Rate Limiting**: Implement exponential backoff if you hit rate limits
    6. **Pagination**: Handle large result sets with cursor-based pagination
    7. **Monitoring**: Track polling failures and sync gaps for debugging

