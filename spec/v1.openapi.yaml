  /accounts/{accountId}/transactions:
    get:
      summary: Fetch transactions for an account
      description: |
        Retrieves a list of transactions for a specified account ID.

        ## Cursor-Based Pagination

        This API uses cursor-based pagination for efficient browsing through large transaction sets. Here's how it works:

        1. **First Request**: Make a request without `transactions_after_id` or `transactions_before_id` to get the first page
        2. **Next Page**: Use the `transactions_after_id` from the pagination response to get the next page
        3. **Previous Page**: Use the `transactions_before_id` from the pagination response to get the previous page

        **Important**: Never use both `transactions_after_id` and `transactions_before_id` in the same request.

        ### Pagination Flow Example:

        ```bash
        # Step 1: Get first page
        curl -X GET 'https://staging.tesote.com/api/v1/accounts/ACCOUNT_ID/transactions?per_page=50' \
          -H 'Authorization: Bearer YOUR_API_KEY'

        # Response includes pagination with transactions_after_id for next page:
        # "pagination": {
        #   "has_more": true,
        #   "per_page": 50,
        #   "transactions_after_id": "last-transaction-id-from-this-page",
        #   "transactions_before_id": "first-transaction-id-from-this-page"
        # }

        # Step 2: Get next page using transactions_after_id from previous response
        curl -X GET 'https://staging.tesote.com/api/v1/accounts/ACCOUNT_ID/transactions?transactions_after_id=last-transaction-id-from-this-page&per_page=50' \
          -H 'Authorization: Bearer YOUR_API_KEY'

        # Step 3: Go back using transactions_before_id from current response
        curl -X GET 'https://staging.tesote.com/api/v1/accounts/ACCOUNT_ID/transactions?transactions_before_id=first-transaction-id-from-this-page&per_page=50' \
          -H 'Authorization: Bearer YOUR_API_KEY'
        ```

        The transactions are ordered by: `transaction_date DESC, created_at DESC, id DESC`
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
          description: The unique identifier of the account
        - name: start_date
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Filter transactions from this date (YYYY-MM-DD)
        - name: end_date
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Filter transactions until this date (YYYY-MM-DD)
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
          description: |
            Number of transactions to return per page (default: 50, max: 100)
        - name: transactions_transactions_after_id
          in: query
          required: false
          schema:
            type: string
          description: Return transactions after this transaction ID, ordered by transaction_date, created_at, and ID
        - name: scope
          in: query
          required: false
          schema:
            type: string
            enum:
              - deleted
          description: Filter transactions by scope (e.g., 'deleted' for soft-deleted transactions)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successful response with transaction data
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                    description: Total count of transactions matching the query
                    example: 3
                  transactions:
                    type: array
                    items:
                      $ref: '#/components/schemas/TransactionList'
                  pagination:
                    type: object
                    properties:
                      has_more:
                        type: boolean
                        description: Indicates if there are more transactions available
                        example: true
                      per_page:
                        type: integer
                        description: Number of transactions per page
                        example: 50
                      transactions_after_id:
                        type: string
                        description: ID of the last transaction in this page - use this for the next page request
                        example: "fe46b712-ad15-46f8-b231-5e266f2d4ff9"
                        nullable: true
                      transactions_before_id:
                        type: string
                        description: ID of the first transaction in this page - use this for the previous page request
                        example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                        nullable: true
        '400':
          description: Invalid request parameters.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Invalid pagination size
        '404':
          description: Account not found.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Account not found
        '422':
          description: Invalid pagination parameters
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Cannot specify both transactions_after_id and transactions_before_id
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Unexpected server error

