          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    additionalProperties: true
                  - type: array
                    items:
                      type: object
                      additionalProperties: true

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    AccountId:
      in: path
      name: accountId
      required: true
      schema: { type: string, format: uuid }
      description: Tesote account ID (mapped from :tesote_account_id)
    TransactionId:
      in: path
      name: transactionId
      required: true
      schema: { type: string, format: uuid }
    Page:
      in: query
      name: page
      schema: { type: integer, minimum: 1 }
    PerPage:
      in: query
      name: per_page
      schema: { type: integer, minimum: 1, maximum: 100 }

  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      required: [error, error_code]
      properties:
        error: { type: string }
        message: { type: string }
        error_code: { type: string }
        error_id: { type: string, format: uuid }
        retry_after: { type: integer }

    JsonRpcRequest:
      type: object
      required: [jsonrpc, method]
      properties:
        jsonrpc:
          type: string
          enum: ["2.0"]
        id:
          oneOf:
            - { type: string }
            - { type: integer }
            - { type: 'null' }
        method: { type: string }
        params:
          type: object
          additionalProperties: true
