      summary: MCP (Model Context Protocol) JSON-RPC endpoint
      description: |
        Pass-through JSON-RPC 2.0 endpoint. Accepts a single object or an array
        of requests. SDKs should expose a raw call surface and let the caller
        deal with the JSON-RPC envelope.
