paths:
  /accounts:
    get:
      summary: Fetch Accounts (Enhanced)
      description: |
        Retrieves a list of accounts using enhanced cursor-based pagination with improved performance and filtering capabilities.

        ## Enhanced Cursor-Based Pagination

        v2.0.0 uses cursor-based pagination for all endpoints, providing better performance and consistency:

        - Use `page` parameter for pagination (default: 1)
        - Use `per_page` parameter to control results per page (max 100, default 50)
        - Response includes pagination metadata with current page, total pages, and total count
        - Enhanced metadata includes total count estimation

        ## New Filtering Options

        - Filter by account type, status, and balance ranges
        - Search by account name or identifier
        - Sort by multiple fields with custom ordering

        cURL example:
        ```bash
        curl -X GET 'https://staging.tesote.com/api/v2/accounts?limit=50' \
          -H 'Content-Type: application/json' \
          -H 'Authorization: Bearer YOUR_TOKEN_HERE'
        ```
      parameters:
        - name: per_page
          in: query
          description: Number of accounts to return per page. Maximum is 100 (default is 50).
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: page
          in: query
          description: Page number for pagination (default is 1).
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successful response with page-based pagination
          content:
            application/json:
              schema:
                type: object
                properties:
                  accounts:
                    type: array
                    items:
                      $ref: '#/components/schemas/AccountV2'
                  pagination:
                    type: object
                    description: Page-based pagination metadata
                    properties:
                      current_page:
                        type: integer
                        example: 1
                      per_page:
                        type: integer
                        example: 50
                      total_pages:
                        type: integer
                        example: 3
                      total_count:
                        type: integer
                        example: 147
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

