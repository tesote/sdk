    # Welcome to the Tesote API v2.0.0 🚀

    The next generation Tesote API provides enhanced security, improved performance, and advanced features for financial data integration. Built for modern applications that demand real-time data synchronization and enterprise-grade reliability.

    ## What's New in v2.0.0
    - **Enhanced Cursor Pagination**: Improved cursor-based pagination for all endpoints
    - **Real-time Sync Endpoints**: New `/sync` endpoints for real-time data synchronization
    - **Webhook Support**: Built-in webhook notifications for account and transaction changes
    - **Advanced Filtering**: More powerful filtering and search capabilities
    - **Improved Error Handling**: Better error responses with detailed error codes
    - **Performance Optimizations**: Faster response times and reduced payload sizes

    ## Key Features
    - **Secure Authentication**: Enhanced JWT-based authentication with API key management
    - **Real-time Data**: Live data synchronization with webhook notifications
    - **Comprehensive Coverage**: Support for 50+ financial institutions and all account types
    - **Developer-Friendly**: OpenAPI 3.1 specification with comprehensive examples
    - **Enterprise Ready**: Built for scale with advanced rate limiting and monitoring
    - **Backward Compatible**: Smooth migration path from v1.0.0

    ## Rate Limiting (Enhanced)
    The v2.0.0 API implements enhanced rate limiting:
    - **Standard Tier**: 200 requests per minute per IP address
    - **Premium Tier**: 500 requests per minute per IP address  
    - **Enterprise Tier**: 1000 requests per minute per IP address
    - **Window**: 60-second rolling window with burst allowance
    - **Response**: `429 Too Many Requests` with detailed retry information
    - **Headers**: Enhanced rate limit headers including remaining quota and reset time

    ## Transaction Lifecycle: Pending vs Completed 💳
    
    Understanding the transaction lifecycle is crucial for building robust financial applications with Tesote API v2.0.0.
    
    ### Transaction States
    There are two primary transaction states in the Tesote system:
    - **Pending**: Initial transaction state when first detected from bank data
    - **Completed**: Final settled state after funds have been fully transferred
    
    ### The Pending-to-Completed Transition Process
    
    #### 1. Initial Pending State
    When a transaction first appears in bank data, it starts as a **pending** transaction:
    ```json
    {
      "id": "ff8c37c0-b538-4074-936c-bca2943a9773",
      "status": "pending",
      "data": {
        "amount_cents": -125000,
        "currency": "USD",
        "description": "ACH Transfer to Vendor Payment",
        "transaction_date": "2024-12-15",
        "external_service_id": "tx_abc123def456"
      },
      "tesote_imported_at": "2024-12-15T10:30:00Z",
      "tesote_updated_at": "2024-12-15T10:30:00Z"
    }
    ```
    
    #### 2. Bank Data Limitations
    **Important**: Unlike some financial data providers, bank data does **not** provide reliable indicators for when transactions are fully settled. Banks often show transactions as "completed" in their systems while the actual settlement process is still ongoing.
    
    #### 3. Tesote's Aging Logic
    To address this limitation, Tesote implements **aging logic** that determines when a transaction has likely fully settled:

    - **Daily Sync Requirement**: Aging logic requires **daily Tesote-to-Bank Syncs** (user-initiated in Tesote platform) to function properly
    - **Business Hours Based**: Currently uses fixed 36 business hours aging across all banks
    - **Initial Status**: When first discovered, transactions appear as `pending` or `completed` based on age
    - **Status Evolution**: `pending` → `completed` after 36 business hours (appears in `modified` array)
    
    **🚀 Coming Soon**: Our team is actively developing a more intelligent aging algorithm that will include:
    - **Smart Confidence Scoring**: AI-powered confidence scores (0.0-1.0) for settlement likelihood
    - **Transaction Pattern Analysis**: Historical transaction behavior analysis
    - **Dynamic Aging Rules**: Adaptive timing based on transaction types and amounts
    - **Real-time Risk Assessment**: Enhanced fraud and settlement risk detection
    
    #### 4. Completed State Transition
    Once 36 business hours have elapsed, the transaction transitions to **completed**:
    ```json
    {
      "id": "ff8c37c0-b538-4074-936c-bca2943a9773", // Same ID as pending state
      "status": "completed",
      "data": {
        "amount_cents": -125000, // Amount typically stays the same
        "currency": "USD",
        "description": "ACH Transfer to Vendor Payment",
        "transaction_date": "2024-12-15",
        "external_service_id": "tx_abc123def456"
      },
      "tesote_imported_at": "2024-12-15T10:30:00Z",
      "tesote_updated_at": "2024-12-17T14:45:00Z" // Updated when status changed
    }
    ```
    
    ### Sync API Behavior During Transitions
    
    When a pending transaction becomes completed, the `/transactions/sync` endpoint represents this through:
    
    **Modified Array**: Contains the same transaction with updated status
    ```json
    {
      "modified": [
        {
          "transaction_id": "ff8c37c0-b538-4074-936c-bca2943a9773",
          "account_id": "account-uuid-456",
          "amount": -1250.00,
          "iso_currency_code": "USD",
          "unofficial_currency_code": "USD",
          "date": "2024-12-15",
          "datetime": "2024-12-15T10:30:00Z",
          "name": "ACH Transfer to Vendor Payment",
          "merchant_name": "ABC Vendor Services",
          "pending": false,
          "category": ["Business Services", "Vendor Payments"]
        }
      ]
    }
    ```
    
    **Important**: The same transaction ID persists through the entire lifecycle - only the status and potentially other details change.
    
    ### Critical Requirements for Accurate Aging

    #### Daily Tesote-to-Bank Sync Dependency
    ```
    ⚠️  CRITICAL: Aging logic requires daily Tesote-to-Bank Syncs (user-initiated)

    Without Recent Tesote-to-Bank Syncs → Cannot Confirm Transaction Status → Aging Stops
    ```

    **Why Daily Tesote-to-Bank Syncs Matter**:
    - Tesote must re-verify transaction data from the bank to confirm it still exists
    - Stale data (>24 hours) cannot be reliably aged due to uncertainty
    - Some pending transactions disappear entirely (authorization holds, cancelled transactions)
    - **Note**: This is about users syncing Tesote with banks, NOT about API consumers syncing with Tesote

    #### Tesote-to-Bank Sync Frequency Recommendations
    | Account Activity | Recommended Sync Frequency | Aging Reliability |
    |------------------|---------------------------|-------------------|
    | **High Volume** (>10 transactions/day) | **2x daily** | Optimal aging timing |
    | **Medium Volume** (3-10 transactions/day) | **Daily** | Good aging timing |
    | **Low Volume** (<3 transactions/day) | **Daily** | Standard aging timing |
    | **No Recent Syncs** (>48 hours) | Immediate | Aging suspended |
    
    ### Transaction Mutability & Edge Cases
    
    #### Completed Transactions Can Still Change
    Even **completed** transactions are not completely immutable:
    - **Refunds**: Can modify or reverse completed transactions
    - **Bank Corrections**: Institutions may recategorize or adjust amounts  
    - **Chargebacks**: Credit card disputes can alter transaction details
    - **Currency Adjustments**: International transactions may have final amount adjustments
    
    #### Pending Transactions That May Not Complete
    Some pending transactions may first appear in `added`, then later be `removed` without becoming completed:
    - **Failed transfers** - Insufficient funds or account issues
    - **Cancelled payments** - Business decision or compliance hold
    - **Data adjustments** - Bank corrections to amount or details after settlement
    - **Authorization failures** - Banking security or compliance blocks
    
    These follow the pattern: `added` → `removed` (skipping the completed state).
    
    ### Best Practices for Implementation
    
    #### 1. Handle All Sync Arrays
    ```python
    def process_sync_response(sync_data):
        # Process in order: removed, modified, added
        for removed_tx in sync_data['removed']:
            delete_transaction(removed_tx['transaction_id'])
            
        for modified_tx in sync_data['modified']:
            update_transaction(modified_tx)
            
        for added_tx in sync_data['added']:
            # Note: added transactions can be either pending or completed
            # depending on when Tesote first discovers them vs. 36 business hour threshold
            create_or_update_transaction(added_tx)
    ```
    

    ## Webhook Notifications 🔔
    **NEW**: Real-time webhook notifications for:
    - **accounts.created** - When new accounts are added to your workspace
    - **accounts.updated** - When account information changes
    - **sync.updates_available** - When new transaction data is ready for synchronization

    ## Setting Up Webhooks via Dashboard UI
    Webhooks are configured through your **Tesote Dashboard** interface, not through API endpoints:

    ### Step-by-Step UI Setup:

    1. **Access Webhook Settings**
       - Log into your Tesote Dashboard
       - Navigate to **Settings** → **Webhook Subscriptions**
       - Click **"Create New Webhook"** button

         2. **Configure Webhook Endpoint**
        - **Webhook URL**: Enter your HTTPS endpoint (e.g., `https://yourapp.com/webhooks/tesote`)
        - **Description**: Add a descriptive name (e.g., "Production Transaction Notifications")
        - **Status**: Toggle "Active" to enable the webhook
        - **Important**: Your endpoint must handle both GET (challenge) and POST (events) requests

         3. **Select Event Types**
        Choose which events trigger notifications:
        - ☑️ **accounts.created** - When new accounts are created in your workspace
        - ☑️ **accounts.updated** - When existing account information is updated
        - ☑️ **sync.updates_available** - When new transaction data is available for sync

         4. **Configure Security Settings**
        - **HMAC Secret**: Tesote generates a unique secret for payload verification
        - **IP Whitelist**: Optionally restrict webhook delivery to Tesote's IP addresses (see IP list below)
        - **Retry Policy**: Configure automatic retry attempts for failed deliveries

    5. **Monitor Webhook Delivery**
       - Check **"Recent Deliveries"** tab to monitor webhook success/failure
       - View detailed logs for debugging failed deliveries
              - Use manual retry for failed webhook attempts

         ### UI Features:
     - **Real-time Status Monitoring**: View delivery success rates and response times
     - **Event Selection**: Checkboxes for each available event type with descriptions
     - **Active Toggle**: Simple on/off switch to enable/disable webhook delivery
     - **Secret Key Display**: View your auto-generated HMAC secret for signature verification
     - **Delivery Logs**: Detailed logs of all webhook attempts with response codes
     - **Manual Retry**: Re-send failed webhook deliveries with one click
     - **Webhook Health**: Dashboard shows webhook endpoint health and uptime

    ## Webhook Payload Format
    All webhook notifications follow this structure:

    ### accounts.created Event:
    ```json
    {
      "id": "webhook-delivery-uuid",
      "event": "accounts.created",
      "created_at": "2024-12-15T10:30:00Z",
      "data": {
        "account_id": "ff8c37c0-b538-4074-936c-bca2943a9773",
        "account_name": "Business Checking (...4521)",
        "currency": "USD",
        "workspace_id": "workspace-uuid"
      }
    }
    ```

    ### accounts.updated Event:
    ```json
    {
      "id": "webhook-delivery-uuid",
      "event": "accounts.updated",
      "created_at": "2024-12-15T10:30:00Z",
      "data": {
        "account_id": "ff8c37c0-b538-4074-936c-bca2943a9773",
        "account_name": "Business Checking (...4521)",
        "changes": ["balance", "status"],
        "workspace_id": "workspace-uuid"
      }
    }
    ```

    ### sync.updates_available Event:
    ```json
    {
      "id": "webhook-delivery-uuid", 
      "event": "sync.updates_available",
      "created_at": "2024-12-15T10:30:00Z",
      "data": {
        "workspace_id": "workspace-uuid",
        "accounts_with_updates": ["account-uuid-1", "account-uuid-2"],
        "update_types": ["transactions", "balances"]
      }
    }
    ```

    **Important**: The signature is sent in HTTP headers, not in the JSON payload.

    ## Sync Cursor & Webhook Process Flow

    Here's a complete example showing how sync cursors work with webhooks when transaction data changes over time:

    **Important Terminology:**
    - **Tesote-to-Bank Sync**: User-initiated syncs within Tesote platform to get new/updated transaction data from banks
    - **API-Consumer-to-Tesote Sync**: Your client application calls Tesote's API to get the updated data using cursors

    **Enhanced Process Flow:**

    ### 🔄 Simple Data Flow
    ```
    Step 1: 🏦 Bank → Transaction occurs (new/updated data)
            ↓
    Step 2: 👤 User initiates Tesote-to-Bank Sync in Tesote platform
            ↓  
    Step 3: 🔄 Tesote fetches & processes bank data
            ↓
    Step 4: 📡 Webhook sent to your endpoint
            ↓ (< 10 seconds)
    Step 5: 💻 Your webhook handler responds & queues job
            ↓
    Step 6: 💻 API-Consumer-to-Tesote Sync API call  
            ↓
    Step 7: 🔄 Tesote returns transaction data + new cursor
            ↓
    Step 8: 💻 Your system stores data & cursor
    ```

    ### 🎯 Two-Stage Process Summary
    ```
    STAGE 1: Tesote-to-Bank Sync (User-Initiated)
    ┌─────────────────────────────────────────────┐
    │ 🏦 Bank Data → 🔄 Tesote Platform           │
    │ • User initiates sync in Tesote UI         │
    │ • Tesote fetches data from bank             │ 
    │ • Can be manual or scheduled                │
    └─────────────────────────────────────────────┘
                            ↓
    STAGE 2: API-Consumer-to-Tesote Sync (Your Code)
    ┌─────────────────────────────────────────────┐
    │ 🔄 Tesote → 📡 Webhook → 💻 Your System     │
    │ • You implement webhook handler             │
    │ • You call sync API with cursor             │
    │ • You store data & new cursor               │
    └─────────────────────────────────────────────┘
    ```

    ### ⏱️ Timing & Responsibilities
    | Step | Actor | Action | Timing | Your Control |
    |------|-------|--------|--------|--------------|
    | ① | Bank | Transaction occurs | Variable | ❌ None |
    | ② | User | Initiate **Tesote-to-Bank Sync** | User-initiated | ✅ **You control timing** |
    | ③ | Tesote | Process & store data | < 1 min | ❌ Automatic after step ② |
    | ④ | Tesote | Send webhook | < 10 sec | ❌ Automatic after step ③ |
    | ⑤ | You | Verify & queue **API-Consumer-to-Tesote Sync** | < 10 sec | ✅ **Critical** |
    | ⑥ | You | **API-Consumer-to-Tesote Sync** API call | < 30 sec | ✅ **You implement** |
    | ⑦ | Tesote | Return transaction data | < 5 sec | ❌ Automatic |
    | ⑧ | You | Store data & cursor | Variable | ✅ **You implement** |

    ### 🎯 Key Success Factors
    - **Fast Webhook Response**: Steps ④→⑤ must complete in < 10 seconds
    - **Cursor Management**: Always store the `new_cursor` from step ⑦ 
    - **Idempotency**: Use `X-Tesote-Webhook-Id` to avoid duplicate processing
    - **Error Handling**: Failed webhooks retry 5x with exponential backoff

    ### 🚨 Error Handling Flow
    ```
    Webhook Delivery Failed (Timeout/Error)
           │
           ▼
    ⏰ Retry Schedule:
    ├─ Attempt 1: +30 seconds
    ├─ Attempt 2: +2 minutes  
    ├─ Attempt 3: +8 minutes
    ├─ Attempt 4: +30 minutes
    └─ Attempt 5: +2 hours
           │
           ▼ (All retries failed)
    📧 Alert sent to your dashboard
    ```

    ### 📊 Sync Scenarios Comparison
    | Scenario | Webhook Payload | Your Action | Expected Result |
    |----------|-----------------|-------------|-----------------|
    | **New Transaction** | `"new_ids": ["tx-123"]` | **API-Consumer-to-Tesote Sync** → Add to DB | Transaction created |
    | **Updated Transaction** | `"updated_ids": ["tx-123"]` | **API-Consumer-to-Tesote Sync** → Update in DB | Transaction modified |
    | **Corrected Transaction** | `"updated_ids": ["tx-123"]` | **API-Consumer-to-Tesote Sync** → Update in DB | Amount/details changed |
    | **Cancelled Transaction** | `"removed_ids": ["tx-123"]` | **API-Consumer-to-Tesote Sync** → Remove from DB | Transaction deleted |
    | **Mixed Changes** | All arrays populated | **API-Consumer-to-Tesote Sync** → Process all | Multiple operations |

    ### 💡 Quick Reference Card
    ```
    ╔══════════════════════════════════════════════════════════════════╗
    ║                        🚀 IMPLEMENTATION CHECKLIST               ║
    ╠══════════════════════════════════════════════════════════════════╣
    ║ ✅ WEBHOOK ENDPOINT: Respond to POST in < 10 seconds             ║
    ║ ✅ SIGNATURE VERIFY: timestamp.payload → HMAC-SHA256             ║ 
    ║ ✅ QUEUE PROCESSING: Don't block webhook with heavy work         ║
    ║ ✅ CLIENT TO TESOTE SYNC: Call /api/v2/transactions/sync         ║
    ║ ✅ CURSOR STORAGE: Always save new_cursor for next sync          ║
    ║ ✅ IDEMPOTENCY: Use X-Tesote-Webhook-Id to avoid duplicates     ║
    ║                                                                  ║
    ║ 🔴 NEVER: Call sync API from webhook handler directly            ║
    ║ 🔴 NEVER: Ignore new_cursor - you'll miss future updates        ║
    ║ 🔴 NEVER: Sync backwards - cursors only move forward            ║
    ╚══════════════════════════════════════════════════════════════════╝
    ```

    ### Initial Setup
    Your client system:
    1. **Configures webhook endpoint**: `https://your-app.com/tesote/webhooks`
    2. **Subscribes to events**: `sync.updates_available`
    3. **Stores sync cursor**: Initially `null` (start from beginning)

    ### Timeline Example: Transaction #1234 Changes

    #### **Day 1 - 10:00 AM: Transaction Created**
    
    **Tesote-to-Bank Sync:** User initiates sync, new transaction detected from bank
    ```json
    {
      "id": "tx-1234",
      "amount": "-2500000", 
      "description": "Payment to ABC Corp",
      "date": "2024-12-15",
      "status": "pending"
    }
    ```

    **Webhook Triggered:** `sync.updates_available`
    ```json
    {
      "id": "webhook-delivery-001",
      "event": "sync.updates_available", 
      "created_at": "2024-12-15T10:00:30Z",
      "data": {
        "id": "account-uuid-456",
        "new_ids": ["tx-1234"],
        "updated_ids": [],
