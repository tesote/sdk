    {
      "id": "tx-1234",
      "amount": "-2500000",
      "description": "Payment to ABC Corp", 
      "date": "2024-12-15",
      "status": "completed" // ← Changed from "pending"
    }
    ```

    **Webhook Triggered:** `sync.updates_available` 
    ```json
    {
      "id": "webhook-delivery-002",
      "event": "sync.updates_available",
      "created_at": "2024-12-15T14:00:15Z", 
