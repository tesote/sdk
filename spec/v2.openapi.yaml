    ```

    **Your Client Response:**
    1. ✅ **Verify webhook signature** 
    2. 🔄 **API-Consumer-to-Tesote Sync** - Call sync API to get the new transaction
    3. 💾 **Store new cursor** for next sync

    #### **Day 1 - 2:00 PM: Transaction Status Updated**
    
    **Tesote-to-Bank Sync:** User initiates sync, transaction status change to "completed" detected from bank
