        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      summary: Sync Account Transactions
      description: |
        **Primary endpoint** for syncing transaction data - your client application fetches the latest transaction changes from Tesote after bank synchronization has occurred.

        This RESTful endpoint follows standard conventions by nesting under the account resource. The account ID is provided in the URL path - no need to include it in the request body.

        ## Features
        - Real-time transaction data synchronization
        - Automatic conflict resolution
        - Cursor-based pagination for efficient data transfer
        - Webhook trigger support

        ## Usage
        **cURL Example**
        ```bash
        curl -X POST "https://staging.tesote.com/api/v2/accounts/{accountId}/transactions/sync" \
             -H "Authorization: Bearer <TOKEN>" \
             -H "Content-Type: application/json" \
             -d '{"cursor": "now", "count": 100}'
        ```

        ## Pagination
        - Use `cursor: "now"` for initial sync or most recent data
        - Use the `next_cursor` UUID from the response for subsequent calls
        - Omit cursor to start from the beginning
      parameters:
        - name: accountId
          in: path
          description: UUID of the account to sync transactions for
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                cursor:
                  type: string
                  description: |
                    Cursor position for pagination. Possible values:
                    - `"now"` - Start from the most recent position
                    - UUID string - Continue from a previous `next_cursor` value
                    - `null` or omit - Start from the beginning
                  example: "now"
                count:
                  type: integer
                  minimum: 1
                  maximum: 1000
                  default: 100
                  description: Maximum number of transactions to fetch in this API-Consumer-to-Tesote Sync
      security:
        - bearerAuth: []
      responses:
        '200':
          description: API-Consumer-to-Tesote Sync completed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  added:
                    type: array
                    description: New transactions added since last sync
                    items:
                      $ref: '#/components/schemas/SyncTransaction'
                  modified:
                    type: array
                    description: Existing transactions that have been modified
                    items:
                      $ref: '#/components/schemas/SyncTransaction'
                  removed:
                    type: array
                    description: Transaction IDs that have been removed
                    items:
                      type: object
                      properties:
                        transaction_id:
                          type: string
                          format: uuid
                          example: "ff8c37c0-b538-4074-936c-bca2943a9773"
                  next_cursor:
                    type: string
                    nullable: true
                    description: Cursor UUID for the next sync request. Pass this value as the cursor parameter in your next API call to continue pagination.
                    example: "497f6eca-6276-4993-bfeb-53cbbbba6f08"
                  has_more:
                    type: boolean
                    description: Whether there are more transactions to sync
                    example: false
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/RateLimited'

