    get:
      summary: List Account Transactions
      description: |
        Returns a paginated list of transactions for a specific account with optional date filtering.

        **cURL**
        ```bash
        curl -X GET 'https://staging.tesote.com/api/v2/accounts/ACCOUNT_ID/transactions?start_date=2024-12-01&end_date=2024-12-31' \
          -H 'Authorization: Bearer YOUR_TOKEN_HERE'
        ```
      parameters:
