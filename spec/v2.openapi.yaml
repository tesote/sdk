    {
      "id": "webhook-delivery-003",
      "event": "sync.updates_available",
      "created_at": "2024-12-16T09:00:45Z",
      "data": {
        "id": "account-uuid-456", 
        "new_ids": [],
        "updated_ids": ["tx-1234"], // ← Same transaction, corrected again
        "removed_ids": [],
        "new_transactions": 0,
        "modified_transactions": 1,
        "removed_transactions": 0,
        "api_sync_cursor": {
          "sync_from": "2024-12-16T09:00:30Z",
          "sync_to": "2024-12-16T09:00:45Z"
        }
      }
    }
    ```

    ### Client Implementation Best Practices

    #### **Webhook Handler:**
    ```python
    @app.route('/tesote/webhooks', methods=['POST'])
    def handle_tesote_webhook():
        # 1. Verify signature
        if not verify_webhook_signature(request.data, request.headers['X-Tesote-Webhook-Signature'], 
                                       request.headers['X-Tesote-Webhook-Timestamp'], WEBHOOK_SECRET):
            return 401
        
        # 2. Parse webhook data  
        webhook_data = request.json
        if webhook_data['event'] == 'sync.updates_available':
                     # 3. Queue API-Consumer-to-Tesote Sync job to avoid blocking webhook response
         sync_queue.enqueue('sync_account_transactions', 
                           account_id=webhook_data['data']['id'],
                           webhook_id=webhook_data['id'])
        
        return 200  # Always respond quickly
    ```

         #### **API-Consumer-to-Tesote Sync Job Handler:**
     ```python
     def sync_account_transactions(account_id, webhook_id):
        # 1. Get stored cursor position
        cursor = get_stored_cursor(account_id) or "latest"
        
                 # 2. API-Consumer-to-Tesote Sync - Call Tesote sync API
         response = tesote_api.post('/api/v2/transactions/sync', {
             "tesote_account_id": account_id,
             "cursor": cursor,
             "count": 100
         })
        
        # 3. Process transaction changes
        for transaction in response['added']:
            create_or_update_transaction(transaction)
            
        for transaction in response['modified']: 
            create_or_update_transaction(transaction)
            
        for removal in response['removed']:
            delete_transaction(removal['transaction_id'])
        
                 # 4. Store new cursor for next API-Consumer-to-Tesote Sync
         if response['new_cursor']:
             store_cursor(account_id, response['new_cursor'])
        
        # 5. Mark webhook as processed (idempotency)
        mark_webhook_processed(webhook_id)
    ```

    #### **Key Implementation Notes:**

    1. **Two-Stage Process**: 
       - **Tesote-to-Bank Sync** is user-initiated in Tesote platform (you control when)
       - **API-Consumer-to-Tesote Sync** is triggered by webhooks (you control how)
    
    2. **Idempotency**: Use `X-Tesote-Webhook-Id` header to avoid processing duplicate webhooks
    
    3. **Cursor Storage**: Always store the `new_cursor` from **API-Consumer-to-Tesote Sync** responses for subsequent syncs  
    
    4. **Fast Response**: Webhook endpoints should respond within 10 seconds (queue heavy **API-Consumer-to-Tesote Sync** processing)
    
    5. **Error Handling**: Failed webhooks are retried up to 5 times with exponential backoff
    
    6. **Transaction Updates**: The same transaction ID can appear in multiple webhook events as user-initiated **Tesote-to-Bank Sync** detects changes
    
    7. **Cursor Progression**: Cursors move forward chronologically during **API-Consumer-to-Tesote Sync** - never sync backwards



    ## Tesote Webhook Delivery Infrastructure
    All webhook requests originate from Tesote's dedicated webhook delivery servers. For enhanced security, you can whitelist these IP addresses:

    ### Webhook Delivery IP Addresses:
    ```
    3.134.238.10
    3.129.111.220
    52.15.118.168
    ```

    ### Firewall Configuration:
    If you use IP-based access control, ensure your firewall allows HTTPS traffic from these IP addresses:

    ```bash
    # Example iptables rules (Linux)
    iptables -A INPUT -p tcp -s 3.134.238.10 --dport 443 -j ACCEPT
    iptables -A INPUT -p tcp -s 3.129.111.220 --dport 443 -j ACCEPT
    iptables -A INPUT -p tcp -s 52.15.118.168 --dport 443 -j ACCEPT
    ```

    ```nginx
    # Example Nginx configuration
    location /webhooks/tesote {
        allow 3.134.238.10;
        allow 3.129.111.220;
        allow 52.15.118.168;
        deny all;
        
        # Your webhook handler
        proxy_pass http://your-app-backend;
    }
    ```

    ```apache
    # Example Apache .htaccess
    <RequireAll>
        Require ip 3.134.238.10
        Require ip 3.129.111.220
        Require ip 52.15.118.168
    </RequireAll>
    ```

    ### Security Notes:
    - **HTTPS Only**: All webhook deliveries use HTTPS (port 443)
    - **Timeout**: Tesote waits up to 10 seconds for your response
    - **Retries**: Failed deliveries are retried up to 5 times with exponential backoff (30s, 2m, 8m, 30m, 2h)
    - **IP Stability**: These IP addresses are stable but may change with advance notice

    ## Webhook Security & Verification
    All webhook event payloads include HMAC-SHA256 signatures for security verification:

    ### Webhook Headers
    Each webhook request includes these headers:
    - `X-Tesote-Webhook-Signature`: HMAC-SHA256 signature for verification
    - `X-Tesote-Webhook-Timestamp`: Unix timestamp when the webhook was sent
    - `X-Tesote-Webhook-Id`: Unique delivery ID for idempotency
    - `X-Tesote-Webhook-Event`: The event type (e.g., "accounts.created")

    ### Verifying Webhook Signatures:
    ```python
    import hmac
    import hashlib

    def verify_webhook_signature(payload, signature, timestamp, secret):
        # Create the signed payload: timestamp.payload
        signed_payload = f"{timestamp}.{payload}"
        
        # Calculate HMAC signature
        calculated_signature = hmac.new(
            secret.encode('utf-8'),
            signed_payload.encode('utf-8'),
            hashlib.sha256
        ).hexdigest()
        
        # Compare signatures securely
        return hmac.compare_digest(signature, calculated_signature)

    # Usage in your webhook endpoint
    webhook_secret = "your_hmac_secret_from_dashboard"
    signature = request.headers['X-Tesote-Webhook-Signature']
    timestamp = request.headers['X-Tesote-Webhook-Timestamp']
    payload = request.body
    
    if verify_webhook_signature(payload, signature, timestamp, webhook_secret):
        # Process the webhook payload
        process_tesote_webhook(payload)
    else:
        # Reject invalid signature
        return 401
    ```

    ### Security Best Practices:
    - **Always verify signatures** before processing webhook payloads using the timestamp + payload method
    - **Use HTTPS endpoints** - Tesote only delivers to secure endpoints
    - **Whitelist IP addresses** - Restrict access to Tesote's webhook delivery IPs (listed above)
    - **Implement idempotency** - Use the `X-Tesote-Webhook-Id` header to handle duplicate deliveries
    - **Return proper HTTP codes** - 200 for success, 4xx/5xx for failures (triggers retry)
    - **Respond quickly** - Tesote waits up to 10 seconds for responses before timing out

    Configure webhooks through your Tesote Dashboard to receive instant notifications when your data changes.

    ## Migration from v1.0.0
    v2.0.0 maintains backward compatibility for core endpoints while introducing enhanced features:
    - All v1.0.0 endpoints remain functional
    - New v2.0.0 endpoints provide enhanced capabilities
    - Gradual migration path with deprecation notices
    - Migration guide available in our developer portal

    ## Getting Started
    1. **Contact your Tesote Account Executive** to upgrade to API v2.0.0
    2. Receive your enhanced bearer token and API access credentials
    3. Test connectivity using the `/v2/status` endpoint
    4. **Set up webhook subscriptions** using the detailed UI guide below:
       - Configure webhook event handling (POST requests)
       - Verify HMAC signatures for security
       - Whitelist Tesote's webhook delivery IP addresses
    5. Start using enhanced sync endpoints for optimal performance
    6. Monitor enhanced rate limits and performance metrics in the dashboard

    **Note**: API v2.0.0 access is available for all enterprise customers. Contact your account executive for upgrade assistance and technical onboarding support.

    ## Moving from Development to Production

    When you're ready to move your integration from development to production, follow these steps:

    ### Step 1: Contact your Tesote Account Executive
    Contact your Tesote Account Executive to Enable production API keys and webhooks for your account

    ### Step 2: Generate Production API Key
    1. **Create API Key**:
       - Navigate to [https://equipo.tesote.com/api_keys](https://equipo.tesote.com/api_keys)
       - Click "Nueva Clave"
       - Provide a descriptive name (e.g., "Production Application v2")
       - Securely store the generated bearer token

    2. **Configure Webhooks**:
       - Navigate to [https://equipo.tesote.com/webhook_subscriptions](https://equipo.tesote.com/webhook_subscriptions)
       - Click "Nueva suscripción de Webhook"
       - Fill out the webhook subscription form with your production webhook URL and select the events you want to receive

    ### Step 3: Update API Endpoints
    Change your base URL from development to production:

    **Development Environment:**
    ```
    https://staging.tesote.com/api/v2
    ```

    **Production Environment:**
    ```
    https://equipo.tesote.com/api/v2
    ```

