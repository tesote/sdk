components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Enhanced JWT Authorization header using the Bearer scheme.
        Example: "Bearer {token}"

  responses:
    BadRequest:
      description: Bad Request - Invalid parameters provided
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized - Invalid or missing bearer token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not Found - The requested resource is not available
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnprocessableEntity:
      description: Unprocessable Entity - Invalid count or cursor parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            invalidCount:
              value:
                error: "count must be between 1 and 1000"
            invalidCursor:
              value:
                error: "Invalid cursor format or cursor does not belong to this account"
    Forbidden:
      description: Forbidden - Historical sync not allowed for this account or time period
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict - Data mutation conflict occurred during sync
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    RateLimited:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RateLimitErrorResponse'

  schemas:
    AccountV2:
      type: object
      required:
        - id
        - name
        - data
        - bank
        - legal_entity
        - tesote_created_at
        - tesote_updated_at
      properties:
        id:
          type: string
          format: uuid
          example: "ff8c37c0-b538-4074-936c-bca2943a9773"
        name:
          type: string
          example: "Banco Santander (...4521)"
        data:
          type: object
          required:
            - masked_account_number
            - currency
            - transactions_data_current_as_of
            - balance_data_current_as_of
          properties:
            masked_account_number:
              type: string
              example: "*****4521"
            currency:
              type: string
              example: "USD"
            transactions_data_current_as_of:
              type: string
              format: date-time
              nullable: true
              example: "2024-12-15T10:30:00-05:00"
            balance_data_current_as_of:
              type: string
              format: date-time
              nullable: true
              example: "2024-12-15T10:30:00-05:00"
            custom_user_provided_identifier:
              type: string
              nullable: true
              example: "CORP-MAIN-001"
            balance_cents:
              type: string
              description: Present only when workspace has "Display Balances in API" enabled in Workspace Settings
              example: "2847650000"
            available_balance_cents:
              type: string
              description: Present only when workspace has "Display Balances in API" enabled in Workspace Settings
              example: "2847650000"
        bank:
          type: object
          properties:
            name:
              type: string
              nullable: true
              example: "Banco Santander México"
        legal_entity:
          type: object
          properties:
            id:
              type: string
              format: uuid
              nullable: true
              example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
            legal_name:
              type: string
              nullable: true
              example: "Grupo Empresarial TechnoLogística S.A. de C.V."
        tesote_created_at:
          type: string
          format: date-time
          example: "2024-12-01T09:15:30-05:00"
        tesote_updated_at:
          type: string
          format: date-time
          example: "2024-12-15T10:30:00-05:00"

    TransactionV2:
      type: object
      required:
        - id
        - account_id
        - amount_cents
        - currency
        - transaction_date
        - tesote_created_at
        - tesote_updated_at
      properties:
        id:
          type: string
          format: uuid
          example: "ff8c37c0-b538-4074-936c-bca2943a9773"
        status:
          type: string
          example: "pending"
        data:
          type: object
          properties:
            amount_cents:
              type: integer
              description: Transaction amount in cents (negative for debits, positive for credits)
              example: -125000
            currency:
              type: string
              example: "USD"
            description:
              type: string
              example: "ACH Transfer to Vendor Payment"
            transaction_date:
              type: string
              format: date
              example: "2024-12-15"
            created_at:
              type: string
              format: date-time
              example: "2024-12-15T10:30:00Z"
            created_at_date:
              type: string
              format: date-time
              example: "2024-12-15"
            note:
              type: string
              example: "ACH Transfer to Vendor Payment"
            external_service_id:
              type: string
              example: "1234567890"
            running_balance_cents:
              type: integer
              nullable: true
              description: Running balance after this transaction (when enabled)
              example: 2847650000
        tesote_imported_at:
          type: string
          format: date-time
          example: "2024-12-15T10:30:00Z"
        tesote_updated_at:
          type: string
          format: date-time
          example: "2024-12-15T14:45:00Z"
        transaction_categories:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                example: "my category"
              external_category_code:
                type: string
                nullable: true
                example: null
              created_at:
                type: string
                format: date-time
                example: "2024-10-07T17:35:42.807-04:00"
              updated_at:
                type: string
                format: date-time
                example: "2024-10-07T17:35:42.807-04:00"
        counterparty:
          type: object
          nullable: true
          properties:
            name:
              type: string
              example: "ABC Vendor Services"
            account_number:
              type: string
              example: "****5678"

    SyncTransaction:
      type: object
      required:
        - transaction_id
        - account_id
        - amount
        - iso_currency_code
        - unofficial_currency_code
        - date
        - name
        - pending
        - category
      properties:
        transaction_id:
          type: string
          format: uuid
          example: "ff8c37c0-b538-4074-936c-bca2943a9773"
        account_id:
          type: string
          format: uuid
          example: "987654ab-cdef-4567-89ab-cdef12345678"
        amount:
          type: number
          format: float
          description: Transaction amount (negative for debits, positive for credits)
          example: -1250.00
        iso_currency_code:
          type: string
          example: "USD"
        unofficial_currency_code:
          type: string
          example: "USD"
        date:
          type: string
          format: date
          example: "2024-12-15"
        datetime:
          type: string
          format: date-time
          nullable: true
          example: "2024-12-15T10:30:00Z"
        name:
          type: string
          description: Transaction description
          example: "ACH Transfer to Vendor Payment"
        merchant_name:
          type: string
          nullable: true
          example: "ABC Vendor Services"
        pending:
          type: boolean
          description: Whether the transaction is pending or completed
          example: false
        category:
          type: array
          items:
            type: string
          example: ["Business Services", "Vendor Payments"]
        running_balance_cents:
          type: integer
          nullable: true
          description: Running balance after this transaction in cents (when enabled)
          example: 2847650000

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: "Invalid parameter"
        error_code:
          type: string
          example: "VALIDATION_ERROR"
        details:
          type: object
          additionalProperties: true

    RateLimitErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: "Rate limit exceeded"
        error_code:
          type: string
          example: "RATE_LIMIT_EXCEEDED"
        retry_after:
          type: integer
          example: 60
        quota_info:
          type: object
          properties:
            limit:
              type: integer
              example: 500
            remaining:
              type: integer
              example: 0
            reset_at:
              type: string
              format: date-time
              example: "2024-12-15T10:31:00-05:00"
