        }
      }
    }
    ```

    #### **Day 2 - 9:00 AM: Transaction Corrected**
    
    **Tesote-to-Bank Sync:** User initiates sync, amount correction detected from bank
    ```json
    {
      "id": "tx-1234", 
      "amount": "-2750000", // ← Amount corrected
      "description": "Payment to ABC Corp (Corrected)",
      "date": "2024-12-15",
      "status": "completed"
    }
    ```

    **Webhook Triggered:** `sync.updates_available`
